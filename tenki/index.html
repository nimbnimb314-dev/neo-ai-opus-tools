<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>日本周辺 予想天気図ビューア</title>
    <link rel="icon" type="image/png" href="../nullandone-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&display=swap">
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav class="site-nav">
      <a href="../" class="site-nav-logo">
        <img src="../nullandone-icon.png" alt="">
        Null and One
      </a>
      <ul class="site-nav-links">
        <li><a href="../">Home</a></li>
        <li><a href="../webtools/">Tools</a></li>
      </ul>
    </nav>

    <header class="app-header">
      <h1>日本周辺 予想天気図ビューア</h1>
      <p class="subtitle">
        ECMWF / GFS / ICON の最新予想天気図を、同じ時間軸で切り替えながら比較できます。
      </p>
    </header>

    <main class="page-shell">
      <section class="panel meta-panel">
        <dl class="meta-strip">
          <div class="meta-item">
            <dt>最新取得時刻</dt>
            <dd id="generated-at">-</dd>
          </div>
          <div class="meta-item">
            <dt>データソース</dt>
            <dd id="data-source">-</dd>
          </div>
        </dl>
      </section>

      <section class="panel slot-panel">
        <div class="slot-panel-header">
          <div>
            <p class="section-kicker">Forecast Slots</p>
            <h2>予想時間を選ぶ</h2>
          </div>
          <p class="current-slot" id="current-slot-label">-</p>
        </div>

        <div class="time-slider-panel">
          <div class="time-slider-toolbar">
            <button class="slider-nav" id="slot-prev" type="button" aria-label="前の予想時間">
              &#8249;
            </button>
            <div class="time-slider-readout">
              <p class="time-slider-label">選択中</p>
              <p class="time-slider-value" id="slider-slot-label">-</p>
            </div>
            <button class="slider-nav" id="slot-next" type="button" aria-label="次の予想時間">
              &#8250;
            </button>
          </div>

          <div class="time-slider-track">
            <input class="time-slider" id="slot-slider" type="range" min="0" max="0" step="1" value="0" />
          </div>
        </div>
      </section>

      <section class="cards" id="model-cards"></section>
    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <ul class="site-footer-links">
          <li><a href="../">Home</a></li>
          <li><a href="../webtools/">Tools</a></li>
        </ul>
        Forecast data: ECMWF Open Data / NOAA NOMADS GFS / DWD ICON Open Data / Map boundary data: Natural Earth<br>
        &copy; 2026 Null and One
      </div>
    </footer>

    <script>
      window.TENKI_MANIFEST_URL = "./data/manifest.js?v=" + Date.now();
      const appScript = document.createElement("script");
      appScript.src = "./app.js?v=" + Date.now();
      document.body.appendChild(appScript);
    </script>
  </body>
</html>
