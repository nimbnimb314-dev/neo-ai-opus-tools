<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="nullandone-icon.png">
<title>Null and One</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1d3a;
  --surface: #13264d;
  --card: #1a315f;
  --card-hover: #214078;
  --border: #2e4b82;
  --text: #ecf2ff;
  --text-dim: #9eb2d6;
  --accent: #73b3ff;
  --accent-2: #90d4ff;
}

body {
  min-height: 100dvh;
  color: var(--text);
  background:
    radial-gradient(900px 500px at 15% -20%, rgba(115, 179, 255, 0.22), transparent 65%),
    radial-gradient(700px 380px at 90% 10%, rgba(144, 212, 255, 0.16), transparent 70%),
    var(--bg);
  font-family: "Zen Kaku Gothic New", "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
}

.container {
  max-width: 1024px;
  margin: 0 auto;
  padding: 28px 20px 72px;
}

.hero {
  text-align: center;
  padding: 42px 12px 30px;
}

.hero-icon {
  width: clamp(190px, 30vw, 320px);
  height: auto;
  filter: drop-shadow(0 12px 26px rgba(0, 0, 0, 0.28));
}

.brand {
  margin-top: 14px;
  font-size: 0.85rem;
  letter-spacing: 0.28em;
  color: var(--text-dim);
  text-transform: uppercase;
}

.headline {
  margin-top: 14px;
  font-size: clamp(1.9rem, 5.2vw, 3.2rem);
  line-height: 1.2;
  font-weight: 800;
  background: linear-gradient(135deg, #6da9ff, #90d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.lead {
  margin-top: 12px;
  color: var(--text-dim);
  font-size: 0.98rem;
}

.content-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 18px;
  margin-top: 28px;
}

.content-card {
  display: block;
  text-decoration: none;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 16px;
  background: var(--card);
  padding: 22px 20px;
  transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
}

.content-card:hover {
  transform: translateY(-3px);
  background: var(--card-hover);
  border-color: var(--accent);
}

.content-label {
  color: var(--accent-2);
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.content-title {
  margin-top: 8px;
  font-size: 1.15rem;
  font-weight: 700;
}

.content-desc {
  margin-top: 8px;
  color: var(--text-dim);
  font-size: 0.9rem;
  line-height: 1.65;
}

.content-arrow {
  display: inline-block;
  margin-top: 12px;
  color: var(--accent);
  font-size: 0.85rem;
  font-weight: 600;
}

.content-card.disabled {
  pointer-events: none;
  opacity: 0.72;
}

footer {
  text-align: center;
  margin-top: 42px;
  color: var(--text-dim);
  font-size: 0.78rem;
  letter-spacing: 0.1em;
}
</style>
</head>
<body>
<div class="container">
  <section class="hero">
    <img src="nullandone-icon.png" alt="Null and One icon" class="hero-icon">
    <div class="brand">Null and One</div>
    <h1 class="headline">Top Page</h1>
    <p class="lead">コンテンツ一覧から目的のページを選択してください。</p>
  </section>

  <main class="content-grid">
    <a href="webtools/" class="content-card">
      <div class="content-label">Content 01</div>
      <div class="content-title">ウェブアプリ</div>
      <p class="content-desc">各種ツールをまとめた一覧ページです。ここから各アプリへ移動できます。</p>
      <span class="content-arrow">Open &rarr;</span>
    </a>

    <div class="content-card disabled" aria-disabled="true">
      <div class="content-label">Content 02</div>
      <div class="content-title">お知らせ</div>
      <p class="content-desc">更新情報やリリースノートを掲載する予定です。</p>
      <span class="content-arrow">Coming Soon</span>
    </div>

    <div class="content-card disabled" aria-disabled="true">
      <div class="content-label">Content 03</div>
      <div class="content-title">プロフィール</div>
      <p class="content-desc">活動内容やプロジェクト紹介を掲載する予定です。</p>
      <span class="content-arrow">Coming Soon</span>
    </div>
  </main>

  <footer>&copy; 2026 Null and One</footer>
</div>
</body>
</html>
