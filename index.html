<title>Null and One</title>
<style>
body {
  margin: 0;
  font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
  background: linear-gradient(180deg, #7dd3fc 0%, #bae6fd 25%, #e0f2fe 50%, #f1f5f9 75%, #c7d2fe 100%);
  min-height: 100vh;
  color: var(--site-text);
}

/* --- Top page content grid --- */
.top-content {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1.25rem 3rem;
}

.top-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1rem;
}

.top-card {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  padding: 1.6rem 1.4rem;
  background: var(--site-card);
  border: 1px solid var(--site-border);
  border-radius: var(--site-radius);
  text-decoration: none;
  color: var(--site-text);
  box-shadow: var(--site-shadow);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
}

.top-card-icon {
  width: 40px;
  height: 40px;
  padding: 8px;
  border-radius: 8px;
  background: var(--site-accent-soft, #e0f2fe);
  color: var(--site-primary);
  transition: background 0.2s, color 0.2s;
}

.top-card:hover {
  transform: translateY(-5px);
  border-color: var(--site-accent, #38bdf8);
  box-shadow:
    0 0 0 3px rgba(56, 189, 248, 0.45),
    0 8px 32px rgba(56, 189, 248, 0.25),
    0 2px 8px rgba(15, 23, 42, 0.08);
}

.top-card:hover .top-card-icon {
  background: var(--site-accent, #38bdf8);
  color: #ffffff;
}

.top-card-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--site-primary);
}

.top-card-title {
  font-size: 1.15rem;
  font-weight: 700;
}

.top-card-desc {
  font-size: 0.88rem;
  color: var(--site-text-light);
  line-height: 1.65;
}

.top-card-arrow {
  margin-top: auto;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--site-accent, #38bdf8);
}

.top-card.disabled {
  pointer-events: none;
  opacity: 0.55;
}

.top-card.disabled .top-card-arrow {
  color: var(--site-text-light);
}
</style>
</head>
<body>

      <svg class="top-card-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
